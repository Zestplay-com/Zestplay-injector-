<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZestPlay Universal Injector Terminal</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
        body { background: #0f172a; color: #f8fafc; padding: 15px; }
        .wrapper { max-width: 550px; margin: 0 auto; background: #1e293b; padding: 20px; border-radius: 12px; border: 1px solid #334155; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3); }
        h2 { text-align: center; color: #38bdf8; margin-bottom: 20px; font-weight: 800; letter-spacing: 0.5px; }
        label { display: block; margin: 12px 0 6px; font-size: 13px; font-weight: 600; color: #94a3b8; }
        input, select, textarea, button { width: 100%; padding: 12px; border-radius: 6px; border: 1px solid #334155; background: #0f172a; color: #fff; font-size: 14px; margin-bottom: 5px; }
        input:focus, textarea:focus, select:focus { border-color: #38bdf8; outline: none; }
        .row { display: flex; gap: 8px; margin-bottom: 5px; }
        .row input, .row select { margin-bottom: 0; }
        .btn-search { width: 120px; background: #0284c7; border: none; font-weight: bold; cursor: pointer; color: white; }
        .btn-search:hover { background: #0369a1; }
        .btn-publish { background: #e50914; border: none; font-weight: 800; font-size: 16px; color: white; cursor: pointer; margin-top: 15px; text-transform: uppercase; letter-spacing: 1px; }
        .btn-publish:hover { background: #b91c1c; }
        #status-alert { padding: 12px; border-radius: 6px; text-align: center; font-weight: bold; margin-bottom: 15px; display: none; font-size: 14px; }
        .msg-success { background: #16a34a; color: #fff; }
        .msg-error { background: #dc2626; color: #fff; }
        .msg-info { background: #2563eb; color: #fff; }
        .preview-box { border: 1px dashed #475569; padding: 10px; border-radius: 6px; margin-top: 5px; background: #1e293b; display: none; align-items: center; gap: 12px; }
        .preview-box img { width: 50px; border-radius: 4px; }
        .preview-details { font-size: 12px; color: #cbd5e1; }
    </style>
</head>
<body>

<div class="wrapper">
    <h2>🚀 ZestPlay Universal Injector</h2>
    <div id="status-alert"></div>

    <!-- TYPE SELECTOR & SMART SEARCH -->
    <label>Search Content Type</label>
    <div class="row">
        <select id="search_type" style="width: 130px;">
            <option value="movie">Movie</option>
            <option value="tv">TV Series</option>
        </select>
        <input type="text" id="lookup_title" placeholder="Type title... (e.g. The Flash)">
        <button type="button" class="btn-search" onclick="fetchTMDBData()">Fetch</button>
    </div>

    <!-- AUTOGENERATED VISUAL PREVIEW -->
    <div id="movie-preview" class="preview-box"></div>

    <!-- FINAL VERIFICATION OUTPUTS -->
    <label>Final Post Title (You can manually edit this for Episodes)</label>
    <input type="text" id="final_title" placeholder="e.g., Movie Name (2026)" required>

    <label>DoodStream Stream/Download URL</label>
    <input type="url" id="download_url" placeholder="Paste your target https://doodstream.com/d/... link here" required>

    <!-- HIDDEN ENGINE VARIABLES -->
    <input type="hidden" id="meta_poster">
    <input type="hidden" id="meta_plot">
    <input type="hidden" id="meta_trailer">
    <input type="hidden" id="meta_year">
    <input type="hidden" id="meta_genre">
    <input type="hidden" id="meta_stars">

    <button type="button" class="btn-publish" onclick="publishToWordPress()">Publish Directly to Website</button>
</div>

<script>
const CONFIG = {
    siteUrl: "https://zestplay.name.ng",
    username: "admin", 
    appPassword: "OILf 3z9a NkuN P6SX gF0U kLrU", 
    tmdbKey: "28c12f59fe4127cdfe2d80c117467874" 
};

async function fetchTMDBData() {
    const type = document.getElementById('search_type').value;
    const query = document.getElementById('lookup_title').value.trim();
    if (!query) { alert('Type a title first!'); return; }

    showAlert("Searching TMDB global catalog...", "msg-info");

    try {
        const searchRes = await fetch(`https://api.themoviedb.org/3/search/${type}?api_key=${CONFIG.tmdbKey}&query=${encodeURIComponent(query)}`);
        const searchData = await searchRes.json();

        if (searchData.results && searchData.results.length > 0) {
            const item = searchData.results[0];
            
            const name = type === 'movie' ? item.title : item.name;
            const dateField = type === 'movie' ? item.release_date : item.first_air_date;
            const year = dateField ? dateField.split('-')[0] : 'N/A';
            
            document.getElementById('final_title').value = `${name} (${year})`;
            document.getElementById('meta_year').value = year;
            document.getElementById('meta_plot').value = item.overview || 'No storyline details recorded.';
            document.getElementById('meta_poster').value = item.poster_path ? `https://image.tmdb.org/t/p/w500${item.poster_path}` : '';

            const detailRes = await fetch(`https://api.themoviedb.org/3/${type}/${item.id}?api_key=${CONFIG.tmdbKey}&append_to_response=credits,videos`);
            const details = await detailRes.json();

            if (details) {
                if (details.videos && details.videos.results) {
                    const trailer = details.videos.results.find(v => v.site === 'YouTube' && (v.type === 'Trailer' || v.type === 'Teaser'));
                    document.getElementById('meta_trailer').value = trailer ? `https://www.youtube.com/watch?v=${trailer.key}` : '';
                }
                if (details.genres) {
                    document.getElementById('meta_genre').value = details.genres.map(g => g.name).join(', ');
                }
                if (details.credits && details.credits.cast) {
                    document.getElementById('meta_stars').value = details.credits.cast.slice(0, 5).map(a => a.name).join(', ');
                }
            }

            const preview = document.getElementById('movie-preview');
            preview.style.display = "flex";
            preview.innerHTML = `
                <img src="${document.getElementById('meta_poster').value || 'https://via.placeholder.com/150'}">
                <div class="preview-details">
                    <strong>Loaded metadata:</strong> ${name} (${year})<br>
                    <span>${(item.overview || '').substring(0, 80)}...</span>
                </div>`;

            showAlert("Autofill processing completed successfully!", "msg-success");
        } else {
            showAlert("No items matching criteria found.", "msg-error");
        }
    } catch (err) {
        showAlert("API Retrieval Failed: " + err.message, "msg-error");
    }
}

async function publishToWordPress() {
    const title = document.getElementById('final_title').value;
    const downloadUrl = document.getElementById('download_url').value;

    if (!title || !downloadUrl) {
        showAlert("Please fill in the stream URL box and search a title first!", "msg-error");
        return;
    }

    showAlert("Injecting data straight into WordPress...", "msg-info");
    const credentials = btoa(`${CONFIG.username}:${CONFIG.appPassword}`);
    
    // GATHER ALL TRACKED METADATA VARIABLES
    const poster = document.getElementById('meta_poster').value;
    const plot = document.getElementById('meta_plot').value;
    const trailer = document.getElementById('meta_trailer').value;
    const genre = document.getElementById('meta_genre').value;
    const stars = document.getElementById('meta_stars').value;

    // BUILD A BEAUTIFUL HTML LAYOUT DIRECTLY INSIDE THE MAIN CONTENT FIELD
    let postHtmlContent = '';
    
    if (poster) {
        postHtmlContent += `<p style="text-align:center;"><img src="${poster}" alt="${title}" style="max-width:100%; border-radius:8px; box-shadow:0 4px 6px rgba(0,0,0,0.1);"></p>`;
    }
    
    postHtmlContent += `<h3>Storyline</h3><p>${plot}</p>`;
    
    if (genre || stars) {
        postHtmlContent += `<p><strong>Genre:</strong> ${genre}<br><strong>Cast:</strong> ${stars}</p><hr>`;
    }

    if (trailer) {
        postHtmlContent += `<h3>Official Trailer</h3><p><a href="${trailer}" target="_blank" style="color:#e50914; font-weight:bold;">Watch Trailer on YouTube</a></p>`;
    }

    // THE STREAM LINK PLACEMENT
    postHtmlContent += `
    <div style="margin:20px 0; text-align:center;">
        <a href="${downloadUrl}" target="_blank" style="background:#e50914; color:#fff; padding:12px 24px; text-decoration:none; font-weight:bold; border-radius:4px; display:inline-block; box-shadow:0 4px 10px rgba(229,9,20,0.4);">
            🎬 STREAM / DOWNLOAD NOW
        </a>
    </div>
    <!-- dstream -->${downloadUrl}`;

    const payload = {
        title: title,
        status: 'publish', // Forces status to publish directly
        content: postHtmlContent
    };

    try {
        const response = await fetch(`${CONFIG.siteUrl}/wp-json/wp/v2/posts`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Basic ${credentials}`
            },
            body: JSON.stringify(payload)
        });

        if (response.ok) {
            showAlert("🎉 Post published live instantly onto your site!", "msg-success");
            document.getElementById('lookup_title').value = '';
            document.getElementById('final_title').value = '';
            document.getElementById('download_url').value = '';
            document.getElementById('movie-preview').style.display = "none";
        } else {
            const errData = await response.json();
            showAlert(`Error: ${errData.message || 'REST API block occurred'}`, "msg-error");
        }
    } catch (err) {
        showAlert(`Network route error: ${err.message}`, "msg-error");
    }
}

function showAlert(msg, className) {
    const alertBox = document.getElementById('status-alert');
    alertBox.innerText = msg;
    alertBox.className = className;
    alertBox.style.display = "block";
}
</script>
</body>
</html>
